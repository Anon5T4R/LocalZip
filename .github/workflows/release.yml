name: Release

on:
  push:
    tags:
      - "v*"

# Duas tags empurradas em sequência não disputam a mesma release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file

      - name: Install JS deps
        run: npm ci

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      # `tagName` vazio = o tauri-action compila e NÃO publica. O token segue
      # no ambiente porque a action o lê na inicialização, antes de decidir se
      # vai publicar — sem ele o passo pode morrer sem nem começar o build.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ""
          includeUpdaterJson: false
          args: --bundles ${{ matrix.bundles }}

      # Junta o que saiu num lugar só. Se o instalador não estiver aqui, o
      # release para AGORA, com a mensagem certa — e não daqui a 15 minutos
      # com "falha no upload", que mandaria investigar o lugar errado.
      - name: Separar o instalador
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          encontrou=0
          for p in src-tauri/target/release/bundle/nsis/*-setup.exe \
                   src-tauri/target/release/bundle/appimage/*.AppImage; do
            [ -e "$p" ] || continue
            cp "$p" dist-release/
            echo "empacotado: $(basename "$p") ($(du -h "$p" | cut -f1))"
            encontrou=1
          done
          if [ "$encontrou" -eq 0 ]; then
            echo "::error::o build terminou sem instalador em ${{ matrix.bundles }}"
            exit 1
          fi

      - name: Guardar o instalador
        uses: actions/upload-artifact@v6
        with:
          name: instalador-${{ matrix.bundles }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # PUBLICA UMA VEZ SÓ, com tudo na mão.
  #
  # `needs` sem `if: always()` é de propósito: se qualquer plataforma falhou, é
  # melhor NÃO ter release nenhuma do que ter uma pela metade — o usuário que só
  # vê o .exe não tem como saber que faltou o AppImage.
  #
  # E como este job não compila nada, repetir uma publicação que falhou custa
  # segundos em vez de meia hora.
  # ---------------------------------------------------------------------------
  publicar:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Baixar os instaladores
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Conferir ANTES de criar a release
        shell: bash
        run: |
          set -uo pipefail
          ls -lh dist/
          falta=0
          ls dist/*-setup.exe >/dev/null 2>&1 \
            || { echo "::error::falta o instalador do Windows"; falta=1; }
          ls dist/*.AppImage >/dev/null 2>&1 \
            || { echo "::error::falta o AppImage"; falta=1; }
          exit $falta

      - name: Publicar (com retentativa)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -uo pipefail
          cat > notas.md <<'EOF'
          ## LocalZip __TAG__

          Compactador 100% offline da suíte Local: abra e navegue zip/tar/tar.gz
          sem extrair, extraia tudo ou só a seleção (com progresso e cancelamento)
          e crie zip/tar.gz. Extração sempre protegida contra zip-slip; aviso de
          possível zip bomb.

          ### Downloads
          - **Windows — Instalador:** `*-setup.exe`
          - **Linux — AppImage:** `*.AppImage` (dê permissão de execução e rode)
          EOF
          sed -i "s/__TAG__/$TAG/g" notas.md

          # `--repo` explícito: este job não faz checkout, então não há
          # repositório git pra o gh inferir — sem isso ele morre com "not a
          # git repository", que parece erro de permissão e manda investigar
          # o token.
          publicar() {
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release upload "$TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
            else
              gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" \
                --title "LocalZip $TAG" --notes-file notas.md
            fi
          }

          for t in 1 2 3 4 5; do
            if publicar; then
              echo "publicado na tentativa $t"
              exit 0
            fi
            echo "tentativa $t falhou; esperando $((t * 20))s"
            sleep $((t * 20))
          done
          echo "::error::a publicação falhou 5 vezes seguidas"
          exit 1

      # Rede de segurança: confirma no servidor o que achamos ter subido.
      - name: Conferir a release publicada
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          nomes=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                    --json assets -q '.assets[].name' 2>/dev/null)
          echo "Anexos na release:"
          echo "${nomes:-(nenhum)}"
          falta=0
          echo "$nomes" | grep -q -- '-setup\.exe$' \
            || { echo "::error::o .exe não chegou na release"; falta=1; }
          echo "$nomes" | grep -q -- '\.AppImage$' \
            || { echo "::error::o AppImage não chegou na release"; falta=1; }
          exit $falta
