name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file

      - name: Install JS deps
        run: npm ci

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LocalZip ${{ github.ref_name }}"
          releaseBody: |
            ## LocalZip ${{ github.ref_name }}

            Compactador 100% offline da suíte Local: abra e navegue zip/tar/tar.gz
            sem extrair, extraia tudo ou só a seleção (com progresso e cancelamento)
            e crie zip/tar.gz. Extração sempre protegida contra zip-slip; aviso de
            possível zip bomb.

            ### Downloads
            - **Windows — Instalador:** `*-setup.exe`
            - **Linux — AppImage:** `*.AppImage` (dê permissão de execução e rode)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles ${{ matrix.bundles }}
