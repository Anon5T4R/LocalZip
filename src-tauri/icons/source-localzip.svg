<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fde8c4"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="512" rx="200" fill="url(#sheen)"/>

  <!-- caixa/pacote comprimido -->
  <rect x="242" y="300" width="540" height="440" rx="42" fill="url(#box)"/>

  <!-- zíper central -->
  <g fill="#b45309">
    <rect x="487" y="300" width="50" height="440" rx="10" opacity="0.25"/>
    <!-- dentes -->
    <g opacity="0.9">
      <rect x="470" y="320" width="36" height="26" rx="6"/>
      <rect x="518" y="352" width="36" height="26" rx="6"/>
      <rect x="470" y="384" width="36" height="26" rx="6"/>
      <rect x="518" y="416" width="36" height="26" rx="6"/>
      <rect x="470" y="448" width="36" height="26" rx="6"/>
      <rect x="518" y="480" width="36" height="26" rx="6"/>
    </g>
    <!-- puxador -->
    <rect x="482" y="520" width="60" height="74" rx="16"/>
    <rect x="497" y="594" width="30" height="82" rx="12"/>
    <circle cx="512" cy="700" r="26" fill="none" stroke="#b45309" stroke-width="18"/>
  </g>

  <!-- setas de compressão (pra dentro) -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M 150 500 L 226 460 L 226 540 Z"/>
    <path d="M 874 500 L 798 460 L 798 540 Z"/>
  </g>

  <!-- easter egg da marca -->
  <text x="512" y="880" font-family="Segoe Script, cursive" font-size="88"
        fill="#ffffff" opacity="0.55" text-anchor="middle">Taylor</text>
</svg>
